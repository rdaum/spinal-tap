# Copy this to spinal-tap.toml or pass its path as the first CLI argument.
listen = "127.0.0.1:8125"
history_points = 120
redraw_millis = 250

[[metrics]]
name = "requests"
view = "chart"
kind = "counter"
display = "rate"
unit = "req"

# Labelled DogStatsD series are grouped under the base metric name.
# This entry matches all variants, for example:
#   requests:1|c|#service:api,host:a
#   requests:1|c|#service:worker,host:b
[[metrics]]
name = "labelled.requests"
view = "sparkline"
kind = "counter"
display = "rate"
unit = "req"

[[metrics]]
name = "queue.depth"
view = "numeric"
kind = "gauge"
display = "latest"
unit = "jobs"

[[metrics]]
name = "request.duration"
view = "chart"
kind = "timer"
display = "latest"
unit = "ms"
